name: Public site build and deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'shared/**'
      - 'public/**'
      - 'scripts/prerender.mjs'
      - 'index.html'
      - 'vite.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/site.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'shared/**'
      - 'public/**'
      - 'scripts/prerender.mjs'
      - 'index.html'
      - 'vite.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/site.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Build and prerender static HTML
        run: npm run build

      - name: Verify prerendered routes exist
        run: |
          test -f docs/index.html
          test -f docs/about/index.html
          test -f docs/contact/index.html
          test -f docs/book/index.html
          test -f docs/guide/index.html
          test -f docs/exam/index.html
          test -f docs/intelligence/index.html
          test -f docs/.nojekyll
          test -f docs/404.html
          grep -q 'data-seo-ready="true"' docs/about/index.html
          grep -q '<h1' docs/book/index.html
          grep -q 'Breed Analysis' docs/index.html
          grep -q 'Breed Analysis' docs/guide/index.html
          grep -q 'breed-rankings' docs/intelligence/index.html

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
