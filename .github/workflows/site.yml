name: Public site build and deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'shared/**'
      - 'public/**'
      - 'scripts/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/site.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'shared/**'
      - 'public/**'
      - 'scripts/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/site.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Build and prerender static HTML
        env:
          # Same Apps Script /exec URL as trainer-app VITE_BOOKING_API_URL
          VITE_FORM_ENDPOINT: ${{ secrets.VITE_BOOKING_API_URL }}
        run: npm run build

      - name: Verify prerendered routes exist
        run: |
          test -f docs/index.html
          test -f docs/about/index.html
          test -f docs/contact/index.html
          test -f docs/book/index.html
          test -f docs/start/index.html
          test -f docs/guide/index.html
          test -f docs/exam/index.html
          test -f docs/intelligence/index.html
          test -f docs/dog-personality/index.html
          test -f docs/breed-finder/index.html
          test -f docs/guide/foundation/index.html
          test -f docs/.nojekyll
          test -f docs/404.html
          test -f docs/robots.txt
          test -f docs/sitemap.xml
          test -f docs/CNAME
          grep -q 'goldstandarddogtraining.nz' docs/CNAME
          grep -q 'Sitemap: https://goldstandarddogtraining.nz/sitemap.xml' docs/robots.txt
          grep -q 'https://goldstandarddogtraining.nz/book' docs/sitemap.xml
          grep -q 'https://goldstandarddogtraining.nz/start' docs/sitemap.xml
          grep -q 'data-seo-ready="true"' docs/about/index.html
          grep -q 'data-seo-ready="true"' docs/start/index.html
          grep -q "You're not failing" docs/start/index.html
          grep -q 'gsdt-site-jsonld' docs/index.html
          grep -q 'ProfessionalService' docs/index.html
          grep -q '<h1' docs/book/index.html
          grep -q 'Breed Analysis' docs/index.html
          grep -q 'Breed Analysis' docs/guide/index.html
          grep -q 'breed-rankings' docs/intelligence/index.html
          grep -q 'rel="canonical"' docs/dog-personality/index.html
          grep -q 'noindex' docs/404.html

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before Pages deploy retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 45

      - name: Deploy to GitHub Pages (retry)
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry
        uses: actions/deploy-pages@v4

      - name: Fail if Pages deploy did not succeed
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: |
          echo "::error::GitHub Pages deploy failed after retry. Re-run this workflow from Actions, or check repo Settings → Pages → Source is GitHub Actions."
          exit 1
