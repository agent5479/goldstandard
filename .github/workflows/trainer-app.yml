name: Trainer App Deploy

# workflow_dispatch: rerun from Actions tab after updating FIREBASE_SERVICE_ACCOUNT

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'trainer-app/**'
      - 'shared/**'
      - 'public/images/**'
      - '.github/workflows/trainer-app.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    defaults:
      run:
        working-directory: trainer-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: trainer-app/package-lock.json

      # github-pages env may set NODE_ENV=production, which makes npm ci omit
      # devDependencies (vite, typescript, sharp) and the build fails immediately.
      - name: Install dependencies
        run: npm ci --include=dev
        env:
          NODE_ENV: development

      - name: Build
        id: build
        env:
          NODE_ENV: development
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_DEFAULT_TENANT_ID: gsdt
          VITE_BOOKING_API_URL: ${{ secrets.VITE_BOOKING_API_URL }}
          VITE_BOOKING_IMPORT_KEY: ${{ secrets.VITE_BOOKING_IMPORT_KEY }}
        run: |
          set -euo pipefail
          echo "NODE_ENV=${NODE_ENV:-unset}"
          echo "Checking build tooling…"
          test -f node_modules/vite/package.json || { echo "::error::vite missing after npm ci"; exit 1; }
          test -f node_modules/typescript/package.json || { echo "::error::typescript missing after npm ci"; exit 1; }
          test -f node_modules/sharp/package.json || { echo "::error::sharp missing after npm ci"; exit 1; }
          node -e "import('sharp').then(() => console.log('sharp load ok')).catch((err) => { console.error(err); console.error('::error::sharp failed to load'); process.exit(1); })"
          echo "Syncing hero photos…"
          node ../scripts/sync-hero-photos.mjs
          node scripts/sync-hero-images.js
          node scripts/generate-trainer-favicons.js
          echo "Compiling TypeScript…"
          npx tsc -b
          echo "Bundling with Vite…"
          npx vite build
          node scripts/inject-runtime-config.js
          echo "Build complete."

      - name: Validate Firebase deploy secret
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is missing. Add it under Settings → Environments → github-pages → Environment secrets."
            exit 1
          fi
          node -e "
            const sa = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
            console.log('Service account:', sa.client_email);
            console.log('Project ID:', sa.project_id);
            if (sa.project_id !== 'gsdt-trainer-private') {
              console.error('::error::Service account project_id is ' + sa.project_id + ', expected gsdt-trainer-private');
              process.exit(1);
            }
          "

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13.35.1

      - name: Verify build output
        run: |
          test -f dist/index.html || (echo "::error::dist/index.html missing after build" && exit 1)
          test -f dist/images/thumbs/olliewelshterrierpuppy.jpg || (echo "::error::Ollie thumb missing from dist — hero image sync failed" && exit 1)
          echo "dist/ ready ($(du -sh dist | cut -f1))"
          echo "Hero thumbs: $(ls dist/images/thumbs/*.jpg | wc -l)"

      - name: Deploy hosting
        id: deploy_hosting
        run: |
          set -o pipefail
          firebase deploy --only hosting --non-interactive 2>&1 | tee /tmp/hosting-deploy.log

      - name: Deploy database rules
        id: deploy_database
        continue-on-error: true
        run: |
          set -o pipefail
          firebase deploy --only database --non-interactive 2>&1 | tee /tmp/database-deploy.log

      - name: Deploy summary
        if: always()
        run: |
          echo "Build: ${{ steps.build.outcome }}"
          echo "Hosting deploy: ${{ steps.deploy_hosting.outcome }}"
          echo "Database rules deploy: ${{ steps.deploy_database.outcome }}"
          if [ "${{ steps.build.outcome }}" != "success" ]; then
            echo "::error::Trainer app build failed — hosting was not updated. Check the Build step log (vite/tsc/sharp must install via npm ci --include=dev)."
            exit 1
          fi
          if [ "${{ steps.deploy_hosting.outcome }}" != "success" ]; then
            echo "::group::Hosting deploy log"
            cat /tmp/hosting-deploy.log || true
            echo "::endgroup::"
            echo "::error::Hosting deploy failed — the trainer app was not updated. Check FIREBASE_SERVICE_ACCOUNT in the github-pages environment: valid JSON for gsdt-trainer-private with Firebase Admin (or Firebase Hosting Admin) IAM."
            exit 1
          fi
          if [ "${{ steps.deploy_database.outcome }}" != "success" ]; then
            echo "::group::Database rules deploy log"
            cat /tmp/database-deploy.log || true
            echo "::endgroup::"
            echo "::warning::Database rules were not updated in CI. Hosting deploy succeeded. Grant Firebase Realtime Database Admin (or Firebase Admin) on gsdt-trainer-private, or run locally: cd trainer-app && firebase deploy --only database --project gsdt-trainer-private"
          fi
