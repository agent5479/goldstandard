<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Page not found | Gold Standard Dog Training</title>
  <script>
    // GitHub Pages SPA fallback: stash the requested path and bounce to the
    // app entry, which restores it before React Router mounts (shows NotFound).
    (function () {
      var base = '/';
      var path = location.pathname + location.search + location.hash;
      sessionStorage.setItem('gsdt:spa-redirect', path);
      location.replace(base);
    })();
  </script>
</head>
<body>
  <p>Page not found. <a href="/">Return home</a>.</p>
</body>
</html>
